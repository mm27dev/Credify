[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/check"
  to = "/.netlify/functions/check"
  status = 200
  force = true

[[redirects]]
  from = "/api/crosscheck"
  to = "/.netlify/functions/crosscheck"
  status = 200
  force = true

[[redirects]]
  from = "/api/class/post"
  to = "/.netlify/functions/class_post"
  status = 200
  force = true

[[redirects]]
  from = "/api/class/get"
  to = "/.netlify/functions/class_get"
  status = 200
  force = true
